spring.datasource.url=jdbc:mysql://${DATABASE_HOST:localhost}:${DATABASE_PORT:3306}/${DATABASE_NAME:jobportal}
spring.datasource.username=${DATABASE_USERNAME:root}
spring.datasource.password=${DATABSE_PASSWORD:root}
spring.jpa.show-sql=${SHOW_SQL: true}
spring.jpa.properties.hibernate.format_sql=${HIBERNAME_FORMAT_SQL:true}
spring.sql.init.schema-locations=classpath:sql/jobportal-schema.sql
spring.sql.init.data-locations=classpath:sql/jobportal-data.sql

#spring.jpa.hibernate.ddl-auto=none

spring.docker.compose.lifecycle-management=start_and_stop
spring.docker.compose.start.command=up